OpenIDE-Module-Long-Description=Exposes a REST API on localhost:8080 for controlling Gephi Desktop through the Model Context Protocol. Enables LLMs like Claude to create projects, manipulate graphs, run layouts, compute statistics, and export data.\n\nDeveloped by Matt Artz (https://www.mattartz.me | ORCID: https://orcid.org/0000-0002-3822-1429)\nSource: https://github.com/MattArtzAnthro
